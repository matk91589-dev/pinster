    <!-- КРИТИЧЕСКИЙ CSS - встроен для мгновенного отображения -->
    <style>
        /* Базовые стили для быстрого старта */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0D0F15;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        body.loaded {
            opacity: 1;
        }
        
        .screen {
            display: none;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        
        .screen.active {
            display: block;
            opacity: 1;
        }
        
        .phone-frame {
            max-width: 450px;
            margin: 0 auto;
            background: #0D0F15;
            min-height: 100vh;
            position: relative;
        }
        
        .loading-placeholder {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
            color: #fff;
            opacity: 0.6;
            font-size: 14px;
        }
        
        /* Навигация */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 450px;
            margin: 0 auto;
            display: flex;
            background: rgba(13, 15, 21, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 8px 24px 12px;
            z-index: 100;
        }
        
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        
        .nav-item.active {
            opacity: 1;
        }
        
        .nav-icon svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #fff;
            stroke-width: 1.5;
        }
        
        .nav-label {
            font-size: 11px;
            color: #fff;
            font-weight: 500;
        }
        
        /* Заголовок */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: transparent;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 800;
            cursor: pointer;
        }
        
        .ping {
            color: #FF5500;
        }
        
        .ster {
            color: #fff;
        }
        
        .icon-settings svg {
            width: 24px;
            height: 24px;
            stroke: #fff;
            fill: none;
            stroke-width: 1.5;
            cursor: pointer;
        }
        
        /* Контент с отступом под навигацию */
        .content {
            padding-bottom: 70px;
        }
        
        /* Загрузка */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,85,0,0.2);
            border-top-color: #FF5500;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        /* Базовые стили для модов */
        .section-title {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            padding: 20px 16px 4px;
        }
        
        .section-subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            padding: 0 16px 20px;
        }
        
        .mode-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 0 16px;
        }
        
        .mode-btn {
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            background: #1A1D24;
            color: #fff;
        }
        
        .mode-btn.faceit {

        }

            background: #2A2F3A;
        }

            border: 1px solid #FF5500;
        }
        
        .mode-btn.public {
            background: #0F1117;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .mode-btn:active {
            transform: scale(0.98);
        }

    <!-- ОПТИМИЗИРОВАННАЯ ЗАГРУЗКА JS -->
    <script>
        (function() {
            const version = window.BUILD_VERSION || Date.now();
            
            // Все JS файлы
            const jsFiles = [
                'js/config.js',
                'js/globals.js', 
                'js/app.js',
                'js/navigation.js',
                'js/settings.js',
                'js/profile.js',
                'js/avatar.js',
                'js/friends.js',
                'js/shop.js',
                'js/search.js',
                'js/logo.js',
                'js/team.js',
                'js/swipe.js'
            ];
            
            let loadedCount = 0;
            const totalFiles = jsFiles.length;
            
            function loadScript(src, index) {
                return new Promise((resolve) => {
                    const script = document.createElement('script');
                    script.src = src + '?v=' + version;
                    
                    // Первые 3 файла грузим без async (критические)
                    if (index < 3) {
                        script.async = false;
                        script.defer = true;
                    } else {
                        script.async = true;
                        script.defer = true;
                    }
                    
                    script.onload = () => {
                        loadedCount++;
                        console.log(`✅ Загружен: ${src.split('/').pop()} (${loadedCount}/${totalFiles})`);
                        resolve();
                    };
                    
                    script.onerror = () => {
                        console.error(`❌ Ошибка: ${src}`);
                        loadedCount++;
                        resolve();
                    };
                    
                    document.head.appendChild(script);
                });
            }
            
            async function loadAllScripts() {
                console.log('🚀 Старт загрузки скриптов...');
                
                // Загружаем последовательно первые 3 критических
                for (let i = 0; i < Math.min(3, jsFiles.length); i++) {
                    await loadScript(jsFiles[i], i);
                }
                
                // Показываем интерфейс
                document.body.classList.add('loaded');
                console.log('✅ Критические модули загружены, интерфейс активен');
                
                // Загружаем остальные параллельно
                const remainingPromises = [];
                for (let i = 3; i < jsFiles.length; i++) {
                    remainingPromises.push(loadScript(jsFiles[i], i));
                }
                await Promise.all(remainingPromises);
                
                console.log('🎉 Все модули загружены!');
                
                // Фоновая загрузка данных
                setTimeout(() => {
                    if (window.Profile && !window.Profile.isProfileLoaded) {
                        if (!window.Profile.telegramId) {
                            window.Profile.telegramId = window.Profile.getTelegramId();
                        }
                        window.Profile.loadProfileFromServer();
                        window.Profile.loadAvatar();
                    }
                    if (window.Friends && !window.Friends.friendsListLoaded) {
                        window.Friends.loadFriendsList();
                    }
                    if (window.Shop && window.Shop.loadShopItems) {
                        window.Shop.loadShopItems();
                    }
                }, 100);
            }
            
            loadAllScripts();
            
            // Предзагрузка изображений кейсов
            window.preloadCaseImages = function() {
                const images = [
                    'cases/common_case.webp',
                    'cases/rare_case.webp',
                    'cases/premium_case.webp',
                    'cases/secret_case.webp'
                ];
                images.forEach(img => {
                    const link = document.createElement('link');
                    link.rel = 'preload';
                    link.as = 'image';
                    link.href = img + '?v=' + version;
                    document.head.appendChild(link);
                });
            };
            setTimeout(() => window.preloadCaseImages(), 500);
        })();
    </script>

        .mode-title.prime { color: #FF5500; }
        .mode-title.public { color: #fff; }
        .mode-subtitle {
            font-size: 14px;
            color: #8E97A6;
            padding: 0 16px 20px;
        }
        .input-label {
            font-size: 12px;
            color: #8E97A6;
            padding: 0 16px 8px;
        }
        .search-input-field, .input-field, .rank-select {
            width: calc(100% - 32px);
            margin: 0 16px 20px;
            padding: 12px;
            background: rgba(26,29,36,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        .play-style {
            display: flex;
            gap: 12px;
            padding: 0 16px;
            margin-bottom: 20px;
        }
        .style-option {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: rgba(26,29,36,0.5);
            border-radius: 12px;
            color: #8E97A6;
            cursor: pointer;
            transition: all 0.2s;
        }
        .style-option.active {
            background: #FF5500;
            color: #fff;
        }
        .comment-section {
            padding: 0 16px;
            margin-bottom: 20px;
        }
        .comment-label {
            font-size: 12px;
            color: #8E97A6;
            margin-bottom: 8px;
        }
        .comment-input {
            width: 100%;
            padding: 12px;
            background: rgba(26,29,36,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            resize: vertical;
            font-family: inherit;
        }
        .mode-search-btn {
            width: calc(100% - 32px);
            margin: 0 16px;
            padding: 14px;
            background: #FF5500;
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }
        
        /* Стили для экрана поиска */
        .search-header {
            text-align: center;
            padding: 40px 16px 20px;
        }
        .search-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .search-timer {
            font-size: 48px;
            font-weight: 800;
            color: #FF5500;
        }
        .search-status {
            text-align: center;
            color: #8E97A6;
            margin-bottom: 40px;
        }
        .search-loading {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }
        .cancel-search-btn {
            width: calc(100% - 32px);
            margin: 0 16px;
            padding: 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,85,0,0.5);
            border-radius: 30px;
            color: #FF5500;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Стили для свайпа */
        .swipe-header {
            text-align: center;
            padding: 20px 16px;
        }
        .swipe-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .swipe-subtitle {
            font-size: 12px;
            color: #8E97A6;
        }
        .swipe-container {
            padding: 0 16px;
        }
        .swipe-card {
            background: rgba(26,29,36,0.8);
            border-radius: 24px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .swipe-timer, .connection-timer {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            color: #FF5500;
        }
        .swipe-player-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .swipe-avatar {
            width: 70px;
            height: 70px;
        }
        .tg-avatar-svg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #2B2F36;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .swipe-name-block {
            flex: 1;
        }
        .swipe-player-id {
            font-size: 12px;
            color: #FF5500;
            margin-bottom: 4px;
        }
        .swipe-player-nick {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }
        .swipe-rating-block {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .swipe-rating-value {
            font-size: 18px;
            font-weight: 700;
        }
        .swipe-stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 16px 0;
        }
        .swipe-stat-item {
            text-align: center;
        }
        .swipe-stat-label {
            font-size: 10px;
            color: #8E97A6;
            margin-bottom: 4px;
        }
        .swipe-stat-value {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }
        .swipe-steam-container, .swipe-faceit-container {
            margin: 12px 0;
        }
        .swipe-link-label {
            font-size: 10px;
            color: #8E97A6;
            margin-bottom: 4px;
        }
        .swipe-link-value {
            font-size: 12px;
            color: #FF5500;
            word-break: break-all;
        }
        .swipe-comment {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .swipe-comment-label {
            font-size: 10px;
            color: #8E97A6;
            margin-bottom: 4px;
        }
        .swipe-comment-text {
            font-size: 12px;
            color: #fff;
        }
        
        /* Стили для соединения */
        .connection-avatars {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .connection-avatar {
            width: 80px;
            height: 80px;
        }
        .connection-line {
            width: 60px;
            height: 2px;
            background: rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }
        .line-pulse {
            position: absolute;
            width: 30px;
            height: 100%;
            background: #FF5500;
            animation: pulse 1.5s infinite;
        }
        .teammate-info {
            text-align: center;
            margin: 16px 0;
        }
        .teammate-nick {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }
        .connection-status {
            text-align: center;
            color: #8E97A6;
            margin: 16px 0;
        }
        .tg-chat-button {
            width: 100%;
            padding: 14px;
            background: #37AEE2;
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .tg-chat-button.disabled {
            background: #2A2F3A;
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        @keyframes pulse {
            0% { left: -30px; }
            100% { left: 100%; }
        }
        
        /* Стили для настроек */
        .settings-screen {
            padding: 0 !important;
        }
        .settings-header {
            padding: 16px;
            text-align: center;
        }
        .settings-title {
            font-size: 20px;
            font-weight: 600;
        }
        .settings-section {
            margin-bottom: 24px;
        }
        .settings-section-title {
            font-size: 12px;
            color: #8E97A6;
            padding: 0 16px 8px;
            text-transform: uppercase;
        }
        .settings-row, .settings-row-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            text-decoration: none;
            color: #fff;
        }
        .settings-row-label {
            font-size: 16px;
        }
        .settings-value {
            font-size: 14px;
            color: #8E97A6;
        }
        .settings-arrow {
            font-size: 18px;
            color: #8E97A6;
        }
        .sound-toggle {
            display: flex;
            gap: 4px;
        }
        .sound-option {
            cursor: pointer;
            color: #8E97A6;
        }
        .sound-option.active {
            color: #FF5500;
            font-weight: 600;
        }
        
        /* Адаптивность */
        @media (max-width: 450px) {
            .phone-frame {
                width: 100%;
            }
        }
        
        /* Скрытые классы */
        .hidden {
            display: none !important;
        }
        .error-message {
            color: #FF5500;
            font-size: 11px;
            margin-top: 4px;
            padding-left: 12px;
        }
        .profile-toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.9);
            color: #fff;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1000;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        .profile-toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</body>
</html>
